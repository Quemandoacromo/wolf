name: Linux build and test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "docker/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "docker/**"

env:
  GST_WAYLAND_COMMIT: b15285a

jobs:
  # Build the Rust-based libgstwaylanddisplay for both architectures
  build-gst-wayland:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04
            arch: x86_64
            lib_path: x86_64-linux-gnu
          - runner: ubuntu-26.04-arm
            arch: aarch64
            lib_path: aarch64-linux-gnu
    steps:
      - name: Restore cached libgstwaylanddisplay-${{ matrix.arch }}
        id: cache-gst-wayland
        uses: actions/cache@v5
        with:
          path: ${{runner.workspace}}/usr
          key: libgstwaylanddisplay-${{ matrix.arch }}-${{ env.GST_WAYLAND_COMMIT }}

      - name: Prepare environment
        if: steps.cache-gst-wayland.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
              libwayland-dev libwayland-server0 libinput-dev libxkbcommon-dev libgbm-dev \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Setup Rust
        if: steps.cache-gst-wayland.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup gst-wayland-display
        if: steps.cache-gst-wayland.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/games-on-whales/gst-wayland-display
          cd gst-wayland-display
          git checkout ${{ env.GST_WAYLAND_COMMIT }}
          cargo install --locked cargo-c
          cargo cinstall -p gst-plugin-wayland-display --prefix=/usr/local --destdir=${{runner.workspace}}

      - name: Archive libgstwaylanddisplay-${{ matrix.arch }}
        uses: actions/upload-artifact@v7
        with:
          name: libgstwaylanddisplay-${{ matrix.arch }}
          path: |
            ${{runner.workspace}}/usr/local/lib/${{ matrix.lib_path }}/liblibgstwaylanddisplay*
            ${{runner.workspace}}/usr/local/lib/${{ matrix.lib_path }}/pkgconfig/
            ${{runner.workspace}}/usr/local/lib/${{ matrix.lib_path }}/gstreamer-1.0/
            ${{runner.workspace}}/usr/local/include/libgstwaylanddisplay/*
          if-no-files-found: error

  # Now run the actual test suite
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ${{ matrix.runner }}
    needs: build-gst-wayland
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-26.04-arm
            arch: aarch64
            cxx: g++
            shared: true
            std: 20
            test_docker: ON
            test_nvidia: OFF
            test_virtual_input: OFF
            test_exceptions: OFF
            name: aarch64
          - runner: ubuntu-26.04
            arch: x86_64
            cxx: g++-12
            other_pkgs: g++-12
            shared: true
            std: 20
            test_docker: ON
            test_nvidia: OFF
            test_virtual_input: OFF
            test_exceptions: ON
            name: g++-12 - STD 20 - Shared true
          - runner: ubuntu-26.04
            arch: x86_64
            cxx: g++-12
            other_pkgs: g++-12
            shared: false
            std: 20
            test_docker: ON
            test_nvidia: OFF
            test_virtual_input: OFF
            test_exceptions: ON
            name: g++-12 - STD 20 - Shared false
          - runner: ubuntu-26.04
            arch: x86_64
            cxx: clang++
            other_pkgs: clang-18
            shared: true
            std: 20
            test_docker: ON
            test_nvidia: OFF
            test_virtual_input: OFF
            test_exceptions: ON
            name: clang++ - STD 20 - Shared true
          - runner: ubuntu-26.04
            arch: x86_64
            cxx: clang++
            other_pkgs: clang-18
            shared: false
            std: 20
            test_docker: ON
            test_nvidia: OFF
            test_virtual_input: OFF
            test_exceptions: ON
            name: clang++ - STD 20 - Shared false

    steps:
      - uses: actions/checkout@v6

      - name: Download pre-built libgstwaylanddisplay-${{ matrix.arch }}
        uses: actions/download-artifact@v8
        with:
          name: libgstwaylanddisplay-${{ matrix.arch }}
          path: ${{runner.workspace}}/libgstwaylanddisplay

      - name: Prepare environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
              ninja-build \
              meson \
              extra-cmake-modules \
              libicu-dev \
              libboost-locale-dev libboost-thread-dev libboost-filesystem-dev libboost-log-dev libboost-stacktrace-dev libboost-container-dev libboost-json-dev \
              libssl-dev \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
              libwayland-dev libwayland-server0 wayland-protocols libinput-dev libxkbcommon-dev libgbm-dev \
              libcurl4-openssl-dev \
              libpulse-dev \
              libevdev-dev \
              libudev-dev \
              libdrm-dev \
              libpci-dev \
              libunwind-dev \
              ${{ matrix.other_pkgs }}

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ matrix.cxx }}-${{ matrix.arch }}

      - name: Setup gst-interpipe
        run: |
          git clone https://github.com/games-on-whales/gst-interpipe.git
          cd gst-interpipe
          mkdir build
          meson build -Denable-gtk-doc=false --prefix ${{runner.workspace}}/libgstwaylanddisplay
          meson install -C build

      - name: Configure build
        working-directory: ${{runner.workspace}}
        env:
          CXX: ${{matrix.cxx}}
        # Note: $GITHUB_WORKSPACE is distinct from ${{runner.workspace}}.
        run: |
          cmake -Bbuild \
                -H$GITHUB_WORKSPACE \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
                -DCMAKE_CXX_EXTENSIONS=OFF \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DBUILD_SHARED_LIBS=${{ matrix.shared }} \
                -DCATCH_DEVELOPMENT_BUILD=ON \
                -DTEST_VIRTUAL_INPUT=${{ matrix.test_virtual_input }} \
                -DTEST_DOCKER=${{ matrix.test_docker }} \
                -DTEST_NVIDIA=${{ matrix.test_nvidia }} \
                -DTEST_SDL=OFF \
                -DTEST_EXCEPTIONS=${{ matrix.test_exceptions }} \
                -G Ninja

      - name: Build tests + lib
        working-directory: ${{runner.workspace}}/build
        run: ninja -j $(nproc) wolftests

      - name: Run tests
        working-directory: ${{runner.workspace}}/build/tests
        env:
          HOST_APPS_STATE_FOLDER: ${{runner.workspace}}
          GST_PLUGIN_PATH: ${{runner.workspace}}/libgstwaylanddisplay
          XDG_RUNTIME_DIR: /tmp
          RUST_BACKTRACE: FULL
          RUST_LOG: FATAL
        run: ./wolftests --reporter JUnit::out=${{runner.workspace}}/report.xml --reporter console::out=-::colour-mode=ansi

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()    # run this step even if previous step failed
        # Fork PRs get a read-only token, so creating the check run fails with
        # "Resource not accessible by integration". Don't let that fail the job:
        # the actual test result is already gated by the "Run tests" step above.
        continue-on-error: true
        with:
          name: ${{ matrix.name }}
          path: ${{runner.workspace}}/report.xml
          reporter: java-junit
